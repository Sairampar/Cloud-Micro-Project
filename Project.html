<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 FIXED IoT Data Collector - ALL SENSORS LIVE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            color: #e0e6ed;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 {
            font-size: 2.8em;
            background: linear-gradient(45deg, #00d4ff, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .status-bar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .status-indicator {
            display: flex; align-items: center; gap: 10px; font-weight: 500;
        }
        .status-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: #ff4757; box-shadow: 0 0 10px rgba(255,71,87,0.5);
            animation: pulse-offline 2s infinite;
        }
        .status-dot.online {
            background: #2ed573; box-shadow: 0 0 15px rgba(46,213,115,0.8);
            animation: pulse-online 1.5s infinite;
        }
        @keyframes pulse-offline {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        @keyframes pulse-online {
            0%, 100% { box-shadow: 0 0 15px rgba(46,213,115,0.8); }
            50% { box-shadow: 0 0 25px rgba(46,213,115,1); }
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px; margin-bottom: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        .card h3 { margin-bottom: 20px; color: #00d4ff; font-size: 1.4em; }
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px; margin-bottom: 15px;
        }
        .sensor {
            background: rgba(255,255,255,0.05);
            padding: 20px 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .sensor::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .sensor.updating::before { left: 100%; }
        .sensor:hover { background: rgba(255,255,255,0.15); transform: scale(1.02); }
        .sensor-value {
            font-size: 2.2em; font-weight: bold; margin: 10px 0;
            background: linear-gradient(45deg, #00d4ff, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sensor-label {
            font-size: 0.9em; opacity: 0.8;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .chart-container { height: 350px; border-radius: 15px; overflow: hidden; background: rgba(0,0,0,0.2); }
        .controls {
            display: flex; gap: 15px; justify-content: center;
            flex-wrap: wrap; margin-bottom: 25px;
        }
        .btn {
            padding: 12px 25px; border: none; border-radius: 25px;
            font-size: 1em; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase;
            letter-spacing: 1px; backdrop-filter: blur(10px);
        }
        .btn-primary {
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            color: white; box-shadow: 0 5px 20px rgba(0,212,255,0.4);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.6);
        }
        .btn-danger {
            background: linear-gradient(45deg, #ff6b9d, #ff8e8e);
            color: white; box-shadow: 0 5px 20px rgba(255,107,157,0.4);
        }
        .btn-danger:hover:not(:disabled) {
            transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,107,157,0.6);
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .data-log {
            max-height: 300px; overflow-y: auto;
            background: rgba(0,0,0,0.3); border-radius: 15px;
            padding: 20px; font-family: 'Courier New', monospace;
            font-size: 0.85em; line-height: 1.6;
        }
        .log-entry {
            padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
            opacity: 0.9; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 0.9; transform: translateY(0); } }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }
        .stat-item {
            text-align: center; padding: 20px;
            background: rgba(255,255,255,0.05); border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value { font-size: 1.8em; font-weight: bold; margin-bottom: 5px; }
        .stat-label { font-size: 0.85em; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .sensor-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌡️ FIXED - ALL SENSORS LIVE UPDATE</h1>
            <p style="opacity: 0.8;">Temperature + All Sensors Update in REAL-TIME</p>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Ready to collect LIVE data...</span>
            </div>
            <div style="font-size: 0.9em; opacity: 0.8;">
                Records: <span id="recordCount">0</span> | 
                Last: <span id="lastUpdate">--:--:--</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn">▶️ START LIVE COLLECTION</button>
            <button class="btn btn-danger" id="stopBtn" disabled>⏹️ STOP</button>
            <button class="btn btn-primary" id="exportBtn">💾 EXPORT DATA</button>
            <button class="btn" id="clearBtn">🗑️ CLEAR DATA</button>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>📡 LIVE SENSORS (All Update!)</h3>
                <div class="sensor-grid" id="sensorGrid"></div>
            </div>

            <div class="card">
                <h3>📊 REAL-TIME CHARTS</h3>
                <div class="chart-container">
                    <canvas id="liveChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>📋 LIVE DATA LOG</h3>
                <div class="data-log" id="dataLog"></div>
            </div>

            <div class="card">
                <h3>📈 STATISTICS</h3>
                <div class="stats-grid" id="statsGrid"></div>
            </div>
        </div>
    </div>

    <script>
        class FixedIoTMonitor {
            constructor() {
                this.isRunning = false;
                this.liveData = {
                    temperature: 0,
                    humidity: 0,
                    pressure: 0,
                    light: 0
                };
                this.dataStore = [];
                this.chartData = { labels: [], temp: [], humidity: [], pressure: [] };
                this.recordCount = 0;
                
                this.init();
            }

            async init() {
                this.elements = {
                    startBtn: document.getElementById('startBtn'),
                    stopBtn: document.getElementById('stopBtn'),
                    clearBtn: document.getElementById('clearBtn'),
                    exportBtn: document.getElementById('exportBtn'),
                    statusDot: document.getElementById('statusDot'),
                    statusText: document.getElementById('statusText'),
                    recordCount: document.getElementById('recordCount'),
                    lastUpdate: document.getElementById('lastUpdate'),
                    sensorGrid: document.getElementById('sensorGrid'),
                    dataLog: document.getElementById('dataLog'),
                    statsGrid: document.getElementById('statsGrid')
                };

                await this.initStorage();
                this.createSensors();
                this.initChart();
                this.loadData();
                
                // Event listeners
                this.elements.startBtn.onclick = () => this.start();
                this.elements.stopBtn.onclick = () => this.stop();
                this.elements.clearBtn.onclick = () => this.clearAll();
                this.elements.exportBtn.onclick = () => this.exportData();
            }

            async initStorage() {
                this.cloudDB = localforage.createInstance({ name: 'IoTFixedData' });
            }

            createSensors() {
                const sensors = [
                    {id: 'temperature', name: '🌡️ Temperature', unit: '°C', color: '#ff6b9d'},
                    {id: 'humidity', name: '💧 Humidity', unit: '%', color: '#4ecdc4'},
                    {id: 'pressure', name: '🌪️ Pressure', unit: 'hPa', color: '#00d4ff'},
                    {id: 'light', name: '💡 Light', unit: 'lux', color: '#ffe66d'}
                ];

                this.elements.sensorGrid.innerHTML = sensors.map(sensor => `
                    <div class="sensor" data-sensor="${sensor.id}">
                        <div class="sensor-label">${sensor.name}</div>
                        <div class="sensor-value" id="value-${sensor.id}">-- ${sensor.unit}</div>
                    </div>
                `).join('');
            }

            initChart() {
                const ctx = document.getElementById('liveChart').getContext('2d');
                this.chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: this.chartData.labels,
                        datasets: [
                            { label: '🌡️ Temperature', data: this.chartData.temp, borderColor: '#ff6b9d', backgroundColor: 'rgba(255,107,157,0.2)', tension: 0.4, fill: true },
                            { label: '💧 Humidity', data: this.chartData.humidity, borderColor: '#4ecdc4', backgroundColor: 'rgba(78,205,196,0.2)', tension: 0.4, fill: true },
                            { label: '🌪️ Pressure', data: this.chartData.pressure, borderColor: '#00d4ff', backgroundColor: 'rgba(0,212,255,0.2)', tension: 0.4, fill: true }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: false } },
                        plugins: { legend: { labels: { color: '#e0e6ed', padding: 20 } } }
                    }
                });
            }

            generateLiveData() {
                const now = Date.now() / 1000;
                return {
                    timestamp: Date.now(),
                    temperature: 22 + Math.sin(now * 0.001) * 6 + (Math.random() - 0.5) * 1.5,
                    humidity: 52 + Math.cos(now * 0.0008) * 18 + (Math.random() - 0.5) * 2,
                    pressure: 1015 + Math.sin(now * 0.0012) * 10 + (Math.random() - 0.5) * 1,
                    light: 300 + Math.random() * 600
                };
            }

            async collectLiveData() {
                const data = this.generateLiveData();
                
                // 🔥 LIVE UPDATE ALL SENSORS
                this.updateAllSensors(data);
                
                // Update chart
                this.updateLiveChart(data);
                
                // Log data
                this.addLiveLog(data);
                
                // Update stats
                this.updateLiveStats(data);
                
                // Store in cloud
                await this.storeData(data);
                
                console.log('✅ LIVE DATA:', data); // Debug log
            }

            updateAllSensors(data) {
                // 🔥 FIX: Update EVERY sensor individually with animation
                Object.keys(data).forEach(key => {
                    if (key !== 'timestamp') {
                        const valueEl = document.getElementById(`value-${key}`);
                        const sensorEl = document.querySelector(`[data-sensor="${key}"]`);
                        
                        if (valueEl && sensorEl) {
                            // Animate update
                            sensorEl.classList.add('updating');
                            setTimeout(() => sensorEl.classList.remove('updating'), 500);
                            
                            // Update value
                            valueEl.textContent = `${data[key].toFixed(1)}`;
                        }
                    }
                });
            }

            updateLiveChart(data) {
                const timeLabel = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                
                this.chartData.labels.push(timeLabel);
                this.chartData.temp.push(data.temperature);
                this.chartData.humidity.push(data.humidity);
                this.chartData.pressure.push(data.pressure);

                if (this.chartData.labels.length > 40) {
                    this.chartData.labels.shift();
                    this.chartData.temp.shift();
                    this.chartData.humidity.shift();
                    this.chartData.pressure.shift();
                }

                this.chart.update('none');
            }

            addLiveLog(data) {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `
                    <span style="color: #00d4ff;">${new Date(data.timestamp).toLocaleTimeString()}</span>
                    🌡️${data.temperature.toFixed(1)}°C 💧${data.humidity.toFixed(1)}% 
                    🌪️${data.pressure.toFixed(1)}hPa 💡${data.light.toFixed(0)}lux
                `;
                this.elements.dataLog.insertBefore(entry, this.elements.dataLog.firstChild);
                
                while (this.elements.dataLog.children.length > 30) {
                    this.elements.dataLog.removeChild(this.elements.dataLog.lastChild);
                }
            }

            updateLiveStats(data) {
                const recentData = this.dataStore.slice(-20); // Last 20 readings
                const avgTemp = recentData.reduce((sum, d) => sum + d.temperature, 0) / Math.max(1, recentData.length);
                
                this.elements.statsGrid.innerHTML = `
                    <div class="stat-item">
                        <div class="stat-value" style="color: #ff6b9d;">${avgTemp.toFixed(1)}°C</div>
                        <div class="stat-label">Avg Temp</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" style="color: #4ecdc4;">${data.humidity.toFixed(1)}%</div>
                        <div class="stat-label">Live Humidity</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" style="color: #00d4ff;">${this.recordCount}</div>
                        <div class="stat-label">Cloud Records</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" style="color: #ffe66d;">${data.light.toFixed(0)}</div>
                        <div class="stat-label">Live Light</div>
                    </div>
                `;
            }

            async storeData(data) {
                await this.cloudDB.setItem(`record_${this.recordCount}`, data);
                this.dataStore.push(data);
                this.recordCount++;
                this.elements.recordCount.textContent = this.recordCount;
                this.elements.lastUpdate.textContent = new Date().toLocaleTimeString();
            }

            async loadData() {
                try {
                    const keys = await this.cloudDB.keys();
                    this.recordCount = keys.length;
                    this.elements.recordCount.textContent = this.recordCount;
                } catch (e) {}
            }

            updateStatus(message, online) {
                this.elements.statusText.textContent = message;
                this.elements.statusDot.classList.toggle('online', online);
            }

            start() {
                if (this.isRunning) return;
                this.isRunning = true;
                this.elements.startBtn.disabled = true;
                this.elements.stopBtn.disabled = false;
                this.updateStatus('🔥 LIVE COLLECTION ACTIVE - All Sensors Updating!', true);
                
                // Collect every 1.5 seconds for smooth updates
                this.interval = setInterval(() => this.collectLiveData(), 1500);
                this.collectLiveData(); // Immediate first reading
            }

            stop() {
                this.isRunning = false;
                this.elements.startBtn.disabled = false;
                this.elements.stopBtn.disabled = true;
                this.updateStatus(`⏸️ Paused - ${this.recordCount} records in cloud`, false);
                if (this.interval) clearInterval(this.interval);
            }

            async clearAll() {
                if (confirm('🗑️ Clear ALL cloud data?')) {
                    await this.cloudDB.clear();
                    this.dataStore = [];
                    this.recordCount = 0;
                    this.elements.dataLog.innerHTML = '';
                    this.elements.recordCount.textContent = '0';
                    this.chart.update();
                    this.updateStatus('✅ Data cleared from cloud', false);
                }
            }

            exportData() {
                const dataStr = JSON.stringify(this.dataStore.slice(-100), null, 2);
                const blob = new Blob([dataStr], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `iot-live-data-${new Date().toISOString().slice(0,10)}.json`;
                link.click();
            }
        }

        // Start monitor
        window.addEventListener('load', () => new FixedIoTMonitor());
    </script>
</body>
</html>
